openapi: 3.0.3
info:
  title: UBIK Payment Service API
  description: |
    API de pagos de UBIK, procesada a través de **Stripe** (modo prueba).

    ## Base URL
    Todas las rutas pasan por el **API Gateway**: `http://localhost:8080`

    ## Autenticación
    La mayoría de endpoints requieren un **JWT Bearer token** en el header `Authorization`.
    El gateway valida el token e inyecta los headers `X-User-Id`, `X-User-Username` y `X-User-Role`
    hacia los microservicios.

    El endpoint `/webhook` es **público** (Stripe lo llama directamente, sin JWT).

    ## Flujo de pago completo
    ```
    1. POST /api/reservations       → crear reserva (estado: PENDING)
    2. GET  /api/payments/config    → obtener publishableKey de Stripe
    3. POST /api/payments/create-intent → obtener clientSecret
    4. stripe.confirmPayment(clientSecret) → el browser llama a Stripe
    5. Stripe → POST /api/payments/webhook → pago confirmado automáticamente
    6. La reserva pasa a estado CONFIRMED
    ```
  version: 1.0.0
  contact:
    name: UBIK Dev Team

servers:
  - url: http://localhost:8080
    description: Desarrollo local (API Gateway)
  - url: https://{ngrokDomain}
    description: Pruebas con ngrok (para webhooks Stripe)
    variables:
      ngrokDomain:
        default: tu-dominio.ngrok-free.app

tags:
  - name: Pagos
    description: Gestión de pagos con Stripe

# ─────────────────────────────────────────────────────────────────────────────
paths:

  /api/payments/config:
    get:
      tags: [Pagos]
      summary: Obtener publishable key de Stripe
      description: |
        Devuelve la clave pública de Stripe (`pk_test_...`) necesaria para
        inicializar `stripe.js` en el frontend.
        Llamar **una vez** al cargar la pantalla de pago.
      operationId: getStripeConfig
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Clave pública de Stripe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StripeConfig'
              example:
                publishableKey: "pk_test_51ABC..."
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/payments/create-intent:
    post:
      tags: [Pagos]
      summary: Crear un PaymentIntent en Stripe
      description: |
        Crea un `PaymentIntent` en Stripe y persiste el pago en la BD con
        estado `PENDING`. Devuelve el `clientSecret` que el frontend usará
        para confirmar el pago con `stripe.confirmPayment()`.

        El `userId` se extrae automáticamente del JWT — no hace falta enviarlo.
      operationId: createPaymentIntent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
            example:
              reservationId: 42
              amountCop: 150000
      responses:
        '201':
          description: PaymentIntent creado. Usar `clientSecret` para confirmar con Stripe.js.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentResponse'
              example:
                paymentId: 7
                clientSecret: "pi_3OxABC_secret_xyzXYZ"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/payments/webhook:
    post:
      tags: [Pagos]
      summary: Webhook de Stripe (llamado por Stripe, no por el frontend)
      description: |
        Endpoint que Stripe llama cuando ocurre un evento de pago.
        **No llamar desde el frontend.** Está permitido sin JWT.

        Eventos manejados:
        - `payment_intent.succeeded` → actualiza pago a `SUCCEEDED` y confirma la reserva
        - `payment_intent.payment_failed` → actualiza pago a `FAILED`

        Devuelve `200 OK` si el evento fue procesado, `400 Bad Request` si la firma es inválida.
      operationId: handleWebhook
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          description: Firma HMAC generada por Stripe para validar la autenticidad del evento
          schema:
            type: string
          example: "t=1614556800,v1=abc123..."
      requestBody:
        required: true
        description: Payload JSON raw del evento Stripe (debe enviarse sin modificar)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StripeWebhookEvent'
      responses:
        '200':
          description: Evento procesado correctamente
        '400':
          description: Firma inválida o error al procesar el evento

  /api/payments/my-payments:
    get:
      tags: [Pagos]
      summary: Listar mis pagos
      description: Devuelve todos los pagos del usuario autenticado, ordenados del más reciente al más antiguo.
      operationId: getMyPayments
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de pagos del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/payments/reservation/{reservationId}:
    get:
      tags: [Pagos]
      summary: Listar pagos de una reserva
      description: Devuelve todos los pagos asociados a una reserva específica.
      operationId: getPaymentsByReservation
      security:
        - BearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          description: ID de la reserva
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        '200':
          description: Lista de pagos de la reserva
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtenido desde `POST /api/auth/login`.
        El gateway lo valida y propaga los headers `X-User-Id`, `X-User-Username`, `X-User-Role`.

  schemas:

    StripeConfig:
      type: object
      description: Configuración pública de Stripe para el frontend
      required: [publishableKey]
      properties:
        publishableKey:
          type: string
          description: Clave pública de Stripe (`pk_test_...` en modo prueba)
          example: "pk_test_51ABC..."

    CreatePaymentRequest:
      type: object
      description: Datos necesarios para crear un PaymentIntent
      required:
        - reservationId
        - amountCop
      properties:
        reservationId:
          type: integer
          format: int64
          description: ID de la reserva a pagar (debe existir en estado PENDING)
          example: 42
        amountCop:
          type: integer
          format: int64
          description: |
            Monto en pesos colombianos (COP).
            Stripe maneja el monto en la unidad menor de la moneda.
            Para COP, 1 unidad = 1 peso (no hay centavos reales).
          minimum: 1
          example: 150000

    CreatePaymentResponse:
      type: object
      description: Respuesta con el ID del pago creado y el clientSecret de Stripe
      required:
        - paymentId
        - clientSecret
      properties:
        paymentId:
          type: integer
          format: int64
          description: ID del pago registrado en la BD de UBIK
          example: 7
        clientSecret:
          type: string
          description: |
            ClientSecret del PaymentIntent de Stripe.
            Formato: `pi_<intentId>_secret_<secret>`.
            Usar con `stripe.confirmPayment({ clientSecret, ... })`.
          example: "pi_3OxABCde12_secret_xyzXYZ"

    PaymentResponse:
      type: object
      description: Detalle completo de un pago
      required:
        - id
        - reservationId
        - userId
        - amountCents
        - currency
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          example: 7
        reservationId:
          type: integer
          format: int64
          example: 42
        userId:
          type: integer
          format: int64
          example: 101
        stripePaymentIntentId:
          type: string
          description: ID del PaymentIntent en Stripe (comienza con `pi_`)
          example: "pi_3OxABCde12"
        amountCents:
          type: integer
          format: int64
          description: Monto en la unidad mínima de la moneda (COP)
          example: 150000
        currency:
          type: string
          description: Código ISO de la moneda, siempre en minúsculas
          example: "cop"
        status:
          $ref: '#/components/schemas/PaymentStatus'
        failureMessage:
          type: string
          nullable: true
          description: Mensaje de error de Stripe si el pago falló, null si no falló
          example: "Your card has insufficient funds."
        createdAt:
          type: string
          format: date-time
          example: "2026-03-05T10:00:00"
        updatedAt:
          type: string
          format: date-time
          example: "2026-03-05T10:01:30"

    PaymentStatus:
      type: string
      description: |
        Estado del pago:
        - `PENDING` — PaymentIntent creado, esperando que el usuario confirme con Stripe.js
        - `SUCCEEDED` — Pago confirmado por Stripe (webhook recibido)
        - `FAILED` — Pago rechazado por Stripe (tarjeta sin fondos, 3DS fallido, etc.)
        - `CANCELED` — Pago cancelado
      enum:
        - PENDING
        - SUCCEEDED
        - FAILED
        - CANCELED
      example: SUCCEEDED

    StripeWebhookEvent:
      type: object
      description: Estructura simplificada del evento Stripe (referencia, no enviar desde el frontend)
      properties:
        id:
          type: string
          example: "evt_1OxABC..."
        type:
          type: string
          example: "payment_intent.succeeded"
        data:
          type: object
          properties:
            object:
              type: object
              description: Objeto PaymentIntent de Stripe

    ErrorResponse:
      type: object
      description: Respuesta de error estándar
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "El ID de la reserva es requerido"
        path:
          type: string
          example: "/api/payments/create-intent"

  responses:

    Unauthorized:
      description: Token JWT ausente, expirado o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 401
            error: Unauthorized
            message: "JWT token es inválido o ha expirado"

    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 400
            error: Bad Request
            message: "El monto debe ser mayor a cero"

    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 404
            error: Not Found
            message: "Reserva no encontrada"

    InternalError:
      description: Error interno (Stripe no disponible, BD caída, etc.)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: 500
            error: Internal Server Error
            message: "Error al crear el PaymentIntent en Stripe"
