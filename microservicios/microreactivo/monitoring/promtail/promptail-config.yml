server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# ===========================================================
# ENVIAR LOGS A LOKI
# ===========================================================
clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ubik
    batchwait: 1s
    batchsize: 1048576   # 1 MB
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

# ===========================================================
# FUENTES DE LOGS
# ===========================================================
scrape_configs:

  # ── Logs de todos los contenedores Docker ─────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]

    relabel_configs:
      # Usar nombre del contenedor como label "container"
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Usar imagen como label "image"
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      # Etiquetas Docker como labels de Loki
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Red del contenedor
      - source_labels: ['__meta_docker_container_network_ip']
        target_label: 'ip'

    pipeline_stages:
      # ── Detectar formato JSON (Spring Boot con Logback JSON) ──
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            timestamp: '@timestamp'
            thread: thread_name
            trace_id: traceId
            span_id: spanId
          # Si el log no es JSON, simplemente se ignora este stage
      
      # ── Extraer el nivel de log ────────────────────────────
      - labels:
          level:
          logger:
          trace_id:
      
      # ── Filtrar logs de DEBUG en producción (opcional) ─────
      # Descomenta si quieres reducir volumen:
      # - drop:
      #     expression: '.*level="DEBUG".*'

      # ── Timestamp desde el log ────────────────────────────
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.999Z07:00"
            - "2006-01-02 15:04:05"

  # ── Logs específicos del Gateway (más detalle) ─────────────
  - job_name: gateway_detailed
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["gateway"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - target_label: 'service'
        replacement: 'gateway'

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            method: http_method
            path: http_path
            status: http_status
            duration: http_duration_ms
            user_id: user_id
      - labels:
          level:
          method:
          status:

  # ── Logs del Payment Service (criticidad alta) ─────────────
  - job_name: payment_detailed
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["payment-service"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - target_label: 'service'
        replacement: 'payment'
      - target_label: 'critical'
        replacement: 'true'

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            payment_id: paymentId
            status: paymentStatus
      - labels:
          level:
          status:
      # Alertar en errores de pago (multiline)
      - match:
          selector: '{service="payment"} |= "ERROR"'
          stages:
            - labels:
                alert: 'payment_error'