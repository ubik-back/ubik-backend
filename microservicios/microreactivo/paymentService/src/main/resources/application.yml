server:
  port: 8085

spring:
  application:
    name: payment-service

  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    pool:
      initial-size: 3
      max-size: 10
      max-idle-time: 30m

  sql:
    init:
      mode: never

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

# ── URLs inter-servicio ───────────────────────────────────────────────────────
services:
  motel-management:
    url: ${MOTEL_MANAGEMENT_URL:http://motel-management-service:8083}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.ubik.paymentservice: DEBUG