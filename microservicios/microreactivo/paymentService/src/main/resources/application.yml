server:
  port: 8085

spring:
  application:
    name: payment-service

  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    pool:
      initial-size: 3
      max-size: 10
      max-idle-time: 30m

  sql:
    init:
      mode: never

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}
  client-id: ${MERCADOPAGO_CLIENT_ID}
  client-secret: ${MERCADOPAGO_CLIENT_SECRET}
  redirect-uri: ${MERCADOPAGO_REDIRECT_URI}
  webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET}
  marketplace-fee-percent: ${MP_FEE_PERCENT:10}
  notification-url: ${MP_NOTIFICATION_URL:http://localhost:8080/api/payments/webhook}
  back-urls:
    success: ${MP_BACK_URL_SUCCESS:http://localhost:4200/payment/success}
    failure: ${MP_BACK_URL_FAILURE:http://localhost:4200/payment/failure}
    pending: ${MP_BACK_URL_PENDING:http://localhost:4200/payment/pending}

services:
  motel-management:
    url: http://motel-management-service:8083
  notification:
    url: http://notification-service:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ubik.paymentservice: DEBUG